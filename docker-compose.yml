services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanager-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TaskManagerPassword123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always

  backend:
    build:
      context: ./TaskManager.Api
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "5205:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=db;Database=TaskManagerDb;User ID=sa;Password=TaskManagerPassword123!;TrustServerCertificate=True;
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./angular-task
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

volumes:
  mssql_data:
    driver: local
