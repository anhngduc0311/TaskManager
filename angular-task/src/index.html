<!doctype html>
<html lang="vi" class="dark">
<head>
  <meta charset="utf-8">
  <title>TaskManager - Jira Dark Mode</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            // Hệ màu nguyên bản từ Jira Dark Mode (Jira Template code.html)
            'surface': '#1d2125',            // Nền chính của ứng dụng
            'surface-hover': '#22272b',      // Hover lên các ô
            'surface-raised': '#282e33',     // Nền các container/thẻ nổi bật
            'surface-overlay': '#384047',    // Nền modal/dropdown
            'border-jira': '#30353d',        // Đường viền tối tiêu chuẩn Jira
            'text-main': '#dee2ec',          // Màu chữ sáng chính
            'text-muted': '#8b919e',         // Màu chữ phụ/mờ
            
            // Các màu sắc tương tác và loại thẻ
            'primary-jira': '#579dff',       // Xanh dương Jira (primary)
            'primary-hover': '#85b8ff',
            'success-jira': '#10b981',
            'warning-jira': '#f59e0b',
            'danger-jira': '#f87171',
            'epic-jira': '#d8b4fe',
            'story-jira': '#93c5fd',
            'bug-jira': '#f87171'
          },
          fontFamily: {
            sans: ['Inter', 'Hanken Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>

  <!-- Google Fonts & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <style>
    /* Reset scrollbar cho đồng bộ tối */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1d2125;
    }
    ::-webkit-scrollbar-thumb {
      background: #384047;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #454f59;
    }
  </style>
</head>
<body class="bg-surface text-text-main font-sans min-h-screen antialiased select-none">
  <app-root></app-root>
</body>
</html>
