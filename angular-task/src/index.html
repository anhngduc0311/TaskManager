<!doctype html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8">
  <title>Task Management</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary-container": "#0052cc",
            "on-primary-container": "#c4d2ff",
            "outline": "#737685",
            "surface": "#f9f9ff",
            "on-primary-fixed": "#001848",
            "secondary": "#0059b8",
            "on-tertiary-fixed": "#001f27",
            "secondary-container": "#0071e6",
            "surface-container-highest": "#d6e3ff",
            "on-secondary-fixed": "#001b3f",
            "inverse-surface": "#20314b",
            "on-secondary-fixed-variant": "#004590",
            "on-secondary-container": "#fefcff",
            "outline-variant": "#c3c6d6",
            "background": "#f9f9ff",
            "on-error-container": "#93000a",
            "inverse-primary": "#b2c5ff",
            "on-surface": "#091c35",
            "on-tertiary-container": "#76e2ff",
            "surface-container-lowest": "#ffffff",
            "surface-dim": "#cadbfc",
            "inverse-on-surface": "#ecf0ff",
            "surface-bright": "#f9f9ff",
            "tertiary-container": "#006477",
            "primary": "#003d9b",
            "surface-container": "#e7eeff",
            "on-error": "#ffffff",
            "on-secondary": "#ffffff",
            "primary-fixed-dim": "#b2c5ff",
            "tertiary-fixed-dim": "#48d7f9",
            "surface-variant": "#d6e3ff",
            "surface-container-high": "#dfe8ff",
            "on-tertiary-fixed-variant": "#004e5d",
            "tertiary-fixed": "#afecff",
            "surface-tint": "#0c56d0",
            "on-tertiary": "#ffffff",
            "on-primary": "#ffffff",
            "surface-container-low": "#f0f3ff",
            "primary-fixed": "#dae2ff",
            "on-surface-variant": "#434654",
            "secondary-fixed": "#d7e2ff",
            "on-primary-fixed-variant": "#0040a2",
            "error-container": "#ffdad6",
            "on-background": "#091c35",
            "tertiary": "#004b59",
            "error": "#ba1a1a",
            "secondary-fixed-dim": "#abc7ff"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "xs": "4px",
            "sm": "8px",
            "lg": "24px",
            "margin-desktop": "24px",
            "xl": "32px",
            "gutter": "16px",
            "unit": "4px",
            "margin-mobile": "16px",
            "md": "16px"
          },
          "fontFamily": {
            "title-sm": ["Inter"],
            "body-sm": ["Inter"],
            "label-caps": ["Inter"],
            "headline-md": ["Inter"],
            "display-lg": ["Inter"],
            "body-md": ["Inter"]
          },
          "fontSize": {
            "title-sm": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
            "body-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
            "label-caps": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700" }],
            "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
            "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
            "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
      font-size: 20px;
    }

    .kanban-column {
      min-width: 280px;
      width: 100%;
    }

    .custom-shadow {
      box-shadow: 0 1px 3px rgba(9, 30, 66, 0.13);
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #DFE1E6;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #B3BAC5;
    }
  </style>
</head>

<body class="bg-surface font-body-md text-on-surface">
  <app-root></app-root>
</body>

</html>
